[package]
name = "s-ion"
version = "1.0.0"
description = "S-ION — The Universal AI Browser"
authors = ["Sam Samarasinghe"]
edition = "2021"

[lib]
name = "s_ion_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

