<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#glow)" stroke-width="24"/>
  <!-- Inner S shape -->
  <text x="256" y="310" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="260" fill="url(#glow)" text-anchor="middle" letter-spacing="-10">S</text>
  <!-- ION dot -->
  <circle cx="400" cy="140" r="20" fill="#FF4500"/>
</svg>
